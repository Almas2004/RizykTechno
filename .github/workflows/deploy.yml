name: CI/CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  DEPLOY_PATH: rizyktechno
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
  SSH_OPTS: -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10

jobs:
  ci:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Build client and server
        run: npm run build:all

      - name: Audit production dependencies
        run: npm audit --omit=dev

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          missing=0
          for name in VPS_HOST VPS_PORT VPS_USER VPS_SSH_KEY POSTGRES_PASSWORD JWT_SECRET ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 30 -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Prepare deploy directory
        run: |
          ssh $SSH_OPTS -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ env.DEPLOY_PATH }}'"

      - name: Upload project
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='dist-server' \
            --exclude='.env' \
            --exclude='.env.production' \
            --exclude='public/uploads/*' \
            -e "ssh $SSH_OPTS -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Write production env on VPS
        run: |
          ssh $SSH_OPTS -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -e
            cd '${{ env.DEPLOY_PATH }}'
            cat > .env.production << 'ENVEOF'
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL=postgresql://technomarket:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/technomarket?schema=public
          PORT=4000
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL || 'Armaw-91.91@mail.ru' }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME=RizykTechno Manager
          CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN || format('http://{0},https://{0}', secrets.VPS_HOST) }}
          UPLOAD_DIR=/app/uploads
          MAX_UPLOAD_MB=2
          VITE_API_URL=/api
          VITE_STORE_PHONE=87756148891
          VITE_STORE_EMAIL=Armaw-91.91@mail.ru
          ENVEOF
            chmod 600 .env.production
          EOF

      - name: Deploy with Docker Compose
        run: |
          ssh $SSH_OPTS -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -e
            cd '${{ env.DEPLOY_PATH }}'
            docker compose pull postgres caddy || true
            docker compose up -d --build --remove-orphans
            docker compose ps
          EOF
