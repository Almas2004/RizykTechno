services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: technomarket
      POSTGRES_USER: technomarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U technomarket -d technomarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        VITE_API_URL: /api
        VITE_STORE_PHONE: ${VITE_STORE_PHONE:-87756148891}
        VITE_STORE_EMAIL: ${VITE_STORE_EMAIL:-Armaw-91.91@mail.ru}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "4000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  uploads_data:
